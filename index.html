<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 가상 피팅룸 - 교육용</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        .slider-hue {
            background: linear-gradient(
                to right,
                #ff0000,
                #ffff00,
                #00ff00,
                #00ffff,
                #0000ff,
                #ff00ff,
                #ff0000
            );
        }
    </style>
</head>

<body class="bg-slate-50 p-4 md:p-8 text-slate-900 min-h-screen">

    <div class="max-w-6xl mx-auto">

        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-indigo-600 mb-2 tracking-tight">
                AI 가상 피팅룸
            </h1>

            <p class="text-slate-500 text-sm md:text-base font-medium">
                인물 사진과 의상 사진을 업로드해보세요!
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- 인물 사진 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

                <div class="flex items-center gap-2 mb-4 text-indigo-600">
                    <i data-lucide="user" size="20"></i>
                    <h2 class="font-bold text-lg">1. 인물 사진 업로드</h2>
                </div>

                <div
                    id="personDropZone"
                    class="relative aspect-[3/4] rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:border-indigo-400 transition-all overflow-hidden bg-slate-50"
                >

                    <img id="personPreview" class="hidden h-full w-full object-cover" />

                    <div id="personPlaceholder" class="text-center p-4">
                        <i data-lucide="camera" class="mx-auto text-slate-400 mb-2" size="40"></i>

                        <p class="text-xs text-slate-500 font-bold">
                            인물 사진 선택<br />
                            또는 드래그
                        </p>
                    </div>

                    <input
                        type="file"
                        id="personInput"
                        class="hidden"
                        accept=".png,.jpg,.jpeg,.webp"
                    />
                </div>
            </div>

            <!-- 의상 -->
            <div class="space-y-6">

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

                    <div class="flex items-center justify-between mb-4">

                        <div class="flex items-center gap-2 text-emerald-600">
                            <i data-lucide="shirt" size="20"></i>
                            <h2 class="font-bold text-lg">2. 의상 사진 업로드</h2>
                        </div>

                        <div class="flex items-center gap-2">
                            <input
                                type="checkbox"
                                id="colorToggle"
                                class="w-4 h-4 text-indigo-600 rounded cursor-pointer"
                            />

                            <label
                                for="colorToggle"
                                class="text-sm font-bold text-slate-600 cursor-pointer"
                            >
                                색상 변경
                            </label>
                        </div>
                    </div>

                    <div
                        id="clothingDropZone"
                        class="relative aspect-[3/4] rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-400 transition-all overflow-hidden bg-slate-50 mb-4"
                    >

                        <img id="clothingPreview" class="hidden h-full w-full object-cover" />

                        <div
                            id="colorOverlay"
                            class="absolute inset-0 pointer-events-none hidden"
                            style="mix-blend-mode: multiply; opacity: 0.6;"
                        ></div>

                        <div id="clothingPlaceholder" class="text-center p-4">

                            <i data-lucide="image" class="mx-auto text-slate-400 mb-2" size="40"></i>

                            <p class="text-xs text-slate-500 font-bold">
                                의상 사진 선택<br />
                                또는 드래그
                            </p>
                        </div>

                        <input
                            type="file"
                            id="clothingInput"
                            class="hidden"
                            accept=".png,.jpg,.jpeg,.webp"
                        />
                    </div>

                    <!-- 색상 조절 -->
                    <div
                        id="colorControls"
                        class="space-y-4 opacity-30 pointer-events-none transition-opacity duration-300"
                    >

                        <div class="space-y-2">

                            <label class="text-[10px] font-black text-slate-400 uppercase">
                                Hue (색상)
                            </label>

                            <input
                                type="range"
                                id="hueRange"
                                min="0"
                                max="360"
                                value="0"
                                class="slider-hue w-full h-3 rounded-lg appearance-none cursor-pointer"
                            />
                        </div>

                        <div
                            class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100"
                        >

                            <div
                                id="colorIndicator"
                                class="w-10 h-10 rounded-full border-2 border-white shadow-sm bg-red-500"
                            ></div>

                            <span
                                id="hexLabel"
                                class="text-xs font-black text-slate-700 uppercase"
                            >
                                #FF0000 적용 예정
                            </span>
                        </div>
                    </div>
                </div>

                <!-- 생성 버튼 -->
                <button
                    id="generateBtn"
                    class="w-full py-5 rounded-2xl font-black text-white bg-slate-300 cursor-not-allowed flex items-center justify-center gap-2 transition-all active:scale-95 shadow-xl"
                >

                    <i data-lucide="sparkles" size="20"></i>

                    가상 피팅 시작하기
                </button>
            </div>

            <!-- 결과 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[500px] flex flex-col">

                <div class="flex items-center justify-between mb-4">

                    <div class="flex items-center gap-2 text-indigo-600">
                        <i data-lucide="sparkles" size="20"></i>
                        <h2 class="font-bold text-lg">피팅 결과</h2>
                    </div>

                    <button
                        id="resetBtn"
                        class="text-slate-400 hover:text-slate-600 transition-colors"
                    >
                        <i data-lucide="refresh-cw" size="18"></i>
                    </button>
                </div>

                <div
                    id="resultContainer"
                    class="flex-grow bg-slate-100 rounded-xl flex items-center justify-center relative overflow-hidden border border-slate-200"
                >

                    <img
                        id="resultImage"
                        class="hidden h-full w-full object-contain"
                    />

                    <div
                        id="resultPlaceholder"
                        class="text-center p-8 opacity-40"
                    >

                        <i
                            data-lucide="layout-template"
                            class="mx-auto text-slate-300 mb-3"
                            size="64"
                        ></i>

                        <p class="text-slate-500 text-sm font-bold leading-relaxed">
                            결과 이미지가<br />
                            여기에 표시됩니다.
                        </p>
                    </div>

                    <div
                        id="loadingIndicator"
                        class="hidden flex flex-col items-center"
                    >

                        <div
                            class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"
                        ></div>

                        <p
                            class="text-indigo-600 text-xs font-black tracking-widest uppercase animate-pulse"
                        >
                            AI FITTING...
                        </p>
                    </div>
                </div>

                <button
                    id="downloadBtn"
                    class="hidden mt-4 w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2"
                >

                    <i data-lucide="download" size="16"></i>

                    이미지 저장하기
                </button>
            </div>
        </div>
    </div>

<script>

lucide.createIcons();


// =========================
// 선생님 설정
// =========================

const MASTER_API_KEY = "AIzaSyDrQBN9OqwqWqal9uelyE_LCQPRivoWEeQ";

const CLASS_PASSWORD = "sw1234";


// =========================
// 요소
// =========================

const personInput = document.getElementById('personInput');

const clothingInput = document.getElementById('clothingInput');

const personPreview = document.getElementById('personPreview');

const clothingPreview = document.getElementById('clothingPreview');

const generateBtn = document.getElementById('generateBtn');

const loadingIndicator = document.getElementById('loadingIndicator');

const resultImage = document.getElementById('resultImage');


// =========================
// 상태
// =========================

let personBase64 = null;

let clothingBase64 = null;


// =========================
// 클릭 이벤트
// =========================

document.getElementById('personDropZone').onclick = () => {
    personInput.click();
};

document.getElementById('clothingDropZone').onclick = () => {
    clothingInput.click();
};


// =========================
// 드래그 앤 드롭
// =========================

setupDropZone('personDropZone', 'person');

setupDropZone('clothingDropZone', 'clothing');

// 추가할 부분 시작
personInput.addEventListener('change', (e) => {
    handleFile(e.target.files[0], 'person');
});

clothingInput.addEventListener('change', (e) => {
    handleFile(e.target.files[0], 'clothing');
});
// 추가할 부분 끝

function setupDropZone(id, type) {

    const zone = document.getElementById(id);

    zone.addEventListener('dragover', (e) => {

        e.preventDefault();

        zone.classList.add('border-indigo-500');
    });

    zone.addEventListener('dragleave', () => {

        zone.classList.remove('border-indigo-500');
    });

    zone.addEventListener('drop', (e) => {

        e.preventDefault();

        zone.classList.remove('border-indigo-500');

        const file = e.dataTransfer.files[0];

        handleFile(file, type);
    });
}


// =========================
// 이미지 리사이즈
// =========================

function resizeImage(file, maxSize = 1024) {

    return new Promise((resolve, reject) => {

        const reader = new FileReader();

        reader.onload = (event) => {

            const img = new Image();

            img.onload = () => {

                let width = img.width;

                let height = img.height;

                if (width > height) {

                    if (width > maxSize) {

                        height *= maxSize / width;

                        width = maxSize;
                    }

                } else {

                    if (height > maxSize) {

                        width *= maxSize / height;

                        height = maxSize;
                    }
                }

                const canvas = document.createElement('canvas');

                canvas.width = width;

                canvas.height = height;

                const ctx = canvas.getContext('2d');

                ctx.drawImage(img, 0, 0, width, height);

                const resizedBase64 = canvas.toDataURL(
                    'image/jpeg',
                    0.85
                );

                resolve(resizedBase64);
            };

            img.onerror = reject;

            img.src = event.target.result;
        };

        reader.onerror = reject;

        reader.readAsDataURL(file);
    });
}


// =========================
// 파일 처리
// =========================

async function handleFile(file, type) {

    if (!file) return;

    const allowedTypes = [
        'image/png',
        'image/jpeg',
        'image/webp'
    ];

    if (!allowedTypes.includes(file.type)) {

        alert('PNG, JPG, WEBP 파일만 가능합니다.');

        return;
    }

    try {

        const resizedBase64 = await resizeImage(file);

        if (type === 'person') {

            personBase64 = resizedBase64;

            personPreview.src = resizedBase64;

            personPreview.classList.remove('hidden');

            document
                .getElementById('personPlaceholder')
                .classList.add('hidden');

        } else {

            clothingBase64 = resizedBase64;

            clothingPreview.src = resizedBase64;

            clothingPreview.classList.remove('hidden');

            document
                .getElementById('clothingPlaceholder')
                .classList.add('hidden');
        }

        checkReady();

    } catch (error) {

        console.error(error);

        alert('이미지 처리 중 오류가 발생했습니다.');
    }
}


// =========================
// 버튼 활성화
// =========================

function checkReady() {

    if (personBase64 && clothingBase64) {

        generateBtn.classList.remove(
            'bg-slate-300',
            'cursor-not-allowed'
        );

        generateBtn.classList.add(
            'bg-indigo-600',
            'hover:bg-indigo-700'
        );
    }
}


// =========================
// 색상 변경
// =========================

const colorToggle = document.getElementById('colorToggle');

const colorControls = document.getElementById('colorControls');

const hueRange = document.getElementById('hueRange');

const colorOverlay = document.getElementById('colorOverlay');


colorToggle.onchange = () => {

    const active = colorToggle.checked;

    colorControls.style.opacity = active ? "1" : "0.3";

    colorControls.style.pointerEvents = active ? "auto" : "none";

    colorOverlay.classList.toggle('hidden', !active);

    updateColor();
};


function updateColor() {

    const h = hueRange.value;

    const hsl = `hsl(${h}, 100%, 50%)`;

    colorOverlay.style.backgroundColor = hsl;

    document.getElementById('colorIndicator').style.backgroundColor = hsl;

    document.getElementById('hexLabel').innerText =
        `${hslToHex(h, 100, 50).toUpperCase()} 적용 예정`;
}


hueRange.oninput = updateColor;


function hslToHex(h, s, l) {

    l /= 100;

    const a = s * Math.min(l, 1 - l) / 100;

    const f = n => {

        const k = (n + h / 30) % 12;

        const color =
            l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);

        return Math.round(255 * color)
            .toString(16)
            .padStart(2, '0');
    };

    return `#${f(0)}${f(8)}${f(4)}`;
}


// =========================
// 생성 버튼
// =========================

generateBtn.onclick = async () => {

    if (!personBase64 || !clothingBase64) return;

    if (!MASTER_API_KEY) {

        alert('API 키를 입력해주세요.');

        return;
    }

    const pw = prompt('체험 비밀번호를 입력하세요.');

    if (pw !== CLASS_PASSWORD) {

        alert('비밀번호가 올바르지 않습니다.');

        return;
    }

    generateBtn.disabled = true;

    generateBtn.classList.add('opacity-50');

    loadingIndicator.classList.remove('hidden');

    resultImage.classList.add('hidden');

    document
        .getElementById('resultPlaceholder')
        .classList.add('hidden');

    document
        .getElementById('downloadBtn')
        .classList.add('hidden');

    const hex = hslToHex(hueRange.value, 100, 50);

    let promptText =
        "Generate a realistic fashion fitting image. " +
        "The person from the first image should wear the clothing from the second image naturally. " +
        "Professional lighting, clean background, high quality.";

    if (colorToggle.checked) {

        promptText +=
            ` Change the clothing color to exactly ${hex}.`;
    }

    try {

        const personMime =
            personBase64.match(/data:(.*);base64/)[1];

        const clothingMime =
            clothingBase64.match(/data:(.*);base64/)[1];

        const response = await fetch(

            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${MASTER_API_KEY}`,

            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    contents: [
                        {
                            parts: [

                                {
                                    text: promptText
                                },

                                {
                                    inlineData: {
                                        mimeType: personMime,
                                        data: personBase64.split(',')[1]
                                    }
                                },

                                {
                                    inlineData: {
                                        mimeType: clothingMime,
                                        data: clothingBase64.split(',')[1]
                                    }
                                }
                            ]
                        }
                    ],

                    generationConfig: {
                        responseModalities: ['TEXT', 'IMAGE']
                    }
                })
            }
        );

        const result = await response.json();

        console.log(result);

        if (result.error) {

            throw new Error(result.error.message);
        }

        if (!result.candidates || !result.candidates.length) {

            throw new Error('AI 응답이 비어 있습니다.');
        }

        const imagePart =
            result.candidates[0]
            ?.content
            ?.parts
            ?.find(p => p.inlineData);

        if (!imagePart) {

            throw new Error('이미지 생성 실패');
        }

        resultImage.src =
            `data:image/png;base64,${imagePart.inlineData.data}`;

        resultImage.classList.remove('hidden');

        document
            .getElementById('downloadBtn')
            .classList.remove('hidden');

    } catch (error) {

        console.error(error);

        alert('에러 발생:\n' + error.message);

        document
            .getElementById('resultPlaceholder')
            .classList.remove('hidden');

    } finally {

        loadingIndicator.classList.add('hidden');

        generateBtn.disabled = false;

        generateBtn.classList.remove('opacity-50');
    }
};


// =========================
// 다운로드
// =========================

document.getElementById('downloadBtn').onclick = () => {

    const link = document.createElement('a');

    link.href = resultImage.src;

    link.download = 'fitting_result.png';

    link.click();
};


// =========================
// 초기화
// =========================

document.getElementById('resetBtn').onclick = () => {

    location.reload();
};

</script>

</body>
</html>
