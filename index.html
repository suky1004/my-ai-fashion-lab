<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sketch-to-Real 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-[#f8fafc] p-4 md:p-8 text-slate-800">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-indigo-100 text-indigo-600 rounded-2xl mb-4">
                <i data-lucide="box" size="32"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-2">AI Sketch-to-Real 3D</h1>
            <p class="text-slate-500 max-w-lg mx-auto text-sm">아이디어를 그리고 실사 3D로 변환하여 다운로드 하세요.</p>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <!-- Drawing Canvas -->
            <div class="xl:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2"><i data-lucide="pen-tool" size="18"></i><h2 class="font-bold text-lg">직접 그리기</h2></div>
                        <div class="flex gap-1">
                            <button id="penBtn" class="p-2 rounded-lg bg-indigo-600 text-white"><i data-lucide="pen-tool" size="16"></i></button>
                            <button id="eraserBtn" class="p-2 rounded-lg bg-slate-100"><i data-lucide="eraser" size="16"></i></button>
                            <button id="clearBtn" class="p-2 rounded-lg bg-slate-100 hover:text-red-600"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    </div>
                    <canvas id="sketchCanvas" width="400" height="400" class="w-full aspect-square border border-slate-200 rounded-2xl bg-white shadow-inner"></canvas>
                    <button id="confirmBtn" class="w-full mt-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-sm flex items-center justify-center gap-2">스케치 확정 <i data-lucide="chevron-right" size="14"></i></button>
                </div>
            </div>
            
            <!-- Settings -->
            <div class="xl:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-full flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2"><i data-lucide="palette" size="18"></i><h2 class="font-bold text-lg">변환할 스케치</h2></div>
                        <button id="suggestBtn" class="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-md flex items-center gap-1 hover:bg-indigo-700">
                            <i data-lucide="sparkles" size="10"></i> 스타일 추천
                        </button>
                    </div>
                    <div id="dropZone" class="relative flex-grow min-h-[250px] rounded-2xl border-2 border-dashed flex flex-col items-center justify-center cursor-pointer border-slate-300 hover:border-indigo-300 transition-all overflow-hidden bg-slate-50">
                        <img id="previewImg" class="hidden max-h-full max-w-full object-contain" />
                        <div id="placeholder" class="text-center p-6">
                            <i data-lucide="camera" class="mx-auto text-slate-300 mb-2" size="32"></i>
                            <p class="text-slate-500 text-xs">사진 업로드</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" />
                    </div>
                    <textarea id="promptInput" class="w-full mt-6 p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs h-24 resize-none font-mono" placeholder="렌더링 스타일 (예: Blue silk dress, professional lighting...)"></textarea>
                    <button id="transformBtn" class="w-full mt-4 py-4 rounded-xl font-black text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 flex items-center justify-center gap-2 shadow-lg">
                        <i data-lucide="wand-2" size="18"></i> 3D 변환 시작
                    </button>
                </div>
            </div>

            <!-- Results -->
            <div class="xl:col-span-4 space-y-6 flex flex-col">
                <div class="bg-slate-900 rounded-3xl p-6 shadow-2xl flex-grow flex flex-col text-white">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2 text-indigo-400 font-bold"><i data-lucide="image" size="20"></i> 3D 렌더링 결과</div>
                        <button id="downloadBtn" class="hidden p-2 bg-slate-800 text-indigo-400 rounded-xl hover:bg-slate-700 transition-colors border border-slate-700">
                            <i data-lucide="download" size="18"></i>
                        </button>
                    </div>
                    <div class="flex-grow bg-slate-800 rounded-2xl flex items-center justify-center overflow-hidden border border-slate-700 min-h-[300px]">
                        <img id="resultImg" class="hidden max-h-full max-w-full object-contain" />
                        <div id="resultPlaceholder" class="text-slate-600 text-xs font-medium italic">결과 이미지가 생성되면 여기에 표시됩니다.</div>
                    </div>
                    <div id="feedbackBox" class="hidden mt-4 p-4 bg-indigo-900/30 border border-indigo-500/30 rounded-xl">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="message-square" size="14" class="text-indigo-400"></i><p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest">AI 디자인 분석</p></div>
                        <p id="feedbackText" class="text-xs text-slate-300 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 text-red-600 text-center text-xs rounded-xl"></div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const apiKey = ""; // API 키는 환경 변수에서 주입됩니다.
        const canvas = document.getElementById('sketchCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isEraser = false;
        let sketchData = null;

        // Canvas Setup
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function start(e) {
            isDrawing = true;
            const { x, y } = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const { x, y } = getCoords(e);
            ctx.strokeStyle = isEraser ? 'white' : '#334155';
            ctx.lineWidth = isEraser ? 20 : 3;
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        document.getElementById('eraserBtn').onclick = () => { isEraser = true; updateToolUI(); };
        document.getElementById('penBtn').onclick = () => { isEraser = false; updateToolUI(); };
        document.getElementById('clearBtn').onclick = () => { ctx.fillRect(0, 0, canvas.width, canvas.height); };

        function updateToolUI() {
            document.getElementById('eraserBtn').className = `p-2 rounded-lg ${isEraser ? 'bg-indigo-600 text-white' : 'bg-slate-100'}`;
            document.getElementById('penBtn').className = `p-2 rounded-lg ${!isEraser ? 'bg-indigo-600 text-white' : 'bg-slate-100'}`;
        }

        // Image Handling
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const placeholder = document.getElementById('placeholder');

        document.getElementById('dropZone').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    sketchData = ev.target.result;
                    previewImg.src = sketchData;
                    previewImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('confirmBtn').onclick = () => {
            sketchData = canvas.toDataURL('image/png');
            previewImg.src = sketchData;
            previewImg.classList.remove('hidden');
            placeholder.classList.add('hidden');
        };

        // AI Logic
        async function apiCall(endpoint, payload) {
            let retries = 5;
            let delay = 1000;
            while (retries > 0) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${endpoint}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) return await res.json();
                } catch (e) {}
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
                retries--;
            }
            throw new Error("API call failed");
        }

        document.getElementById('suggestBtn').onclick = async () => {
            if (!sketchData) return;
            try {
                const res = await apiCall('gemini-2.5-flash-preview-09-2025:generateContent', {
                    contents: [{ parts: [{ text: "Suggest 3D rendering styles for this sketch in keywords." }, { inlineData: { mimeType: "image/png", data: sketchData.split(',')[1] } }] }]
                });
                document.getElementById('promptInput').value = res.candidates[0].content.parts[0].text.trim();
            } catch (e) { alert("추천 실패"); }
        };

        document.getElementById('transformBtn').onclick = async () => {
            if (!sketchData) return;
            const btn = document.getElementById('transformBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin"></i> 변환 중...';
            lucide.createIcons();

            try {
                const res = await apiCall('gemini-2.5-flash-image-preview:generateContent', {
                    contents: [{ parts: [{ text: `Photorealistic 3D render from sketch. Style: ${document.getElementById('promptInput').value || 'Cinematic'}` }, { inlineData: { mimeType: "image/png", data: sketchData.split(',')[1] } }] }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                });

                const imgData = res.candidates[0].content.parts.find(p => p.inlineData)?.inlineData?.data;
                if (imgData) {
                    const fullUrl = `data:image/png;base64,${imgData}`;
                    document.getElementById('resultImg').src = fullUrl;
                    document.getElementById('resultImg').classList.remove('hidden');
                    document.getElementById('resultPlaceholder').classList.add('hidden');
                    document.getElementById('downloadBtn').classList.remove('hidden');
                    
                    // Get feedback
                    const fbRes = await apiCall('gemini-2.5-flash-preview-09-2025:generateContent', {
                        contents: [{ parts: [{ text: "Critique this 3D render in Korean and suggest one improvement." }, { inlineData: { mimeType: "image/png", data: imgData } }] }]
                    });
                    document.getElementById('feedbackText').innerText = fbRes.candidates[0].content.parts[0].text;
                    document.getElementById('feedbackBox').classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('errorMsg').innerText = "오류가 발생했습니다. 다시 시도해 주세요.";
                document.getElementById('errorMsg').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        };

        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.href = document.getElementById('resultImg').src;
            link.download = `AI-Design-${Date.now()}.png`;
            link.click();
        };
    </script>
</body>
</html>
